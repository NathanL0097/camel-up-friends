<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#172b2b" />
  <title>好友桌游馆 · 在线开桌</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;600;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css" />
  <link rel="stylesheet" href="/games/draw-and-guess.css" />
  <link rel="stylesheet" href="/games/poker-night.css" />
</head>
<body>
  <div class="sun"></div>
  <header class="topbar">
    <a class="brand" href="/"><span class="brand-mark">🎲</span><span>好友桌游馆<small>在线开桌</small></span></a>
    <button id="rulesButton" class="ghost-button">玩法说明</button>
  </header>

  <main>
    <section id="landing" class="landing">
      <div class="hero-copy">
        <div class="eyebrow">多款桌游 · 实时联机 · 免注册加入</div>
        <h1>今晚，开一桌。</h1>
        <p>选择游戏、创建好友房，把链接发给朋友。平台统一处理房间与重连，每款游戏保留自己的规则和体验。</p>
        <div class="feature-row"><span>⚡ 实时同步</span><span>🔗 链接即进房</span><span>📱 手机可玩</span></div>
      </div>
      <div class="entry-card paper">
        <label>选择游戏</label>
        <div id="gameCatalog" class="game-catalog"><button class="game-choice selected" data-game-id="camel-race"><span>🐪</span><b>沙漠驼队竞速</b><small>2–8人 · 技术演示</small></button></div>
        <label for="nameInput">你的昵称</label>
        <input id="nameInput" maxlength="16" placeholder="例如：沙漠赌神" autocomplete="nickname" />
        <button id="createButton" class="primary-button">创建好友房 <span>→</span></button>
        <div class="divider"><span>或者</span></div>
        <div class="join-row"><input id="codeInput" maxlength="6" placeholder="输入 6 位房间码" /><button id="joinButton">加入</button></div>
        <p id="entryHint" class="hint"></p>
      </div>
    </section>

    <section id="lobby" class="lobby hidden">
      <div class="lobby-card paper">
        <div class="eyebrow"><span id="lobbyGameTitle">好友桌游</span> · 你的好友房</div>
        <h2>等待探险队集合</h2>
        <p>复制链接发给朋友，他们不需要注册账号。</p>
        <div class="share-box"><span id="shareUrl"></span><button id="copyButton">复制链接</button></div>
        <div class="room-code">房间码 <strong id="roomCode"></strong></div>
        <div id="lobbyPlayers" class="lobby-players"></div>
        <div id="gameLobbySettings"></div>
        <button id="startButton" class="primary-button">开始比赛</button>
        <p id="hostHint" class="hint">只有房主可以开始；建议 2–8 人。</p>
      </div>
    </section>

    <section id="game" class="game hidden"><div id="gameMount"></div></section>
  </main>

  <dialog id="rulesDialog">
    <button id="closeRules" class="dialog-close">×</button>
    <div id="rulesContent"></div>
  </dialog>
  <div id="toast" class="toast"></div>
  <script src="/socket.io/socket.io.js"></script>
  <script src="/app.js"></script>
</body>
</html>
